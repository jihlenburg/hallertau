# DoldenBlick — selbstgehostetes Infisical (gehärtet) auf doldenblick-vault (10.0.0.2).
# Gehärtet ggü. dem offiziellen POC-Compose: gepinnte Tags, Postgres 16, Redis mit Passwort
# + noeviction (BullMQ-Queues), db/redis OHNE veröffentlichte Ports, Backend nur an 127.0.0.1
# (SSH-Tunnel-Admin) UND private IP 10.0.0.2 (für doldenblick-01) gebunden, mem_limits.
# Secrets liegen in ./.env (0600, on-box via setup-env.sh erzeugt) — niemals im Repo.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: infisical
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical -d infisical"]
      interval: 10s
      timeout: 5s
      retries: 12
    mem_limit: 512m
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    mem_limit: 320m
  backend:
    image: infisical/infisical:v0.161.9
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
      - "10.0.0.2:8080:8080"
    mem_limit: 1200m
volumes:
  pg_data:

# DoldenBlick — nginx-Snippet: Reverse-Proxy für Bright Sky (DWD-Warnungen).
# Wird im 443-Server-Block der Site eingebunden:  include snippets/doldenblick-app.conf;
# Ablage auf dem Server: /etc/nginx/snippets/doldenblick-app.conf
#
# Hintergrund: Die App holt Open-Meteo und die Kartendienste (OpenFreeMap, Bayern-DOP40)
# direkt aus dem Browser (CORS-fähig, HTTPS). Nur Bright Sky sendet keine CORS-Header —
# daher dieser serverseitige Proxy (ersetzt den Vite-Dev-Proxy aus der Entwicklung).
location /api/brightsky/ {
    proxy_pass https://api.brightsky.dev/;
    proxy_ssl_server_name on;
    proxy_set_header Host api.brightsky.dev;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# DoldenBlick — nginx-Snippet: Reverse-Proxy für Bright Sky (DWD-Warnungen).
# Wird im 443-Server-Block der Site eingebunden:  include snippets/doldenblick-app.conf;
# Ablage auf dem Server: /etc/nginx/snippets/doldenblick-app.conf
#
# Hintergrund: Die App holt Open-Meteo und die Kartendienste (OpenFreeMap, Bayern-DOP40)
# direkt aus dem Browser (CORS-fähig, HTTPS). Nur Bright Sky sendet keine CORS-Header —
# daher dieser serverseitige Proxy (ersetzt den Vite-Dev-Proxy aus der Entwicklung).
location /api/brightsky/ {
    proxy_pass https://api.brightsky.dev/;
    proxy_ssl_server_name on;
    proxy_set_header Host api.brightsky.dev;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# SPA-History-Fallback für die pfadbasierten Onboarding-Routen (main.ts liest window.location.pathname).
# Exakte Treffer, damit nur die zwei real existierenden Routen index.html ausliefern — kein pauschaler
# /index.html-Fallback (der würde jede Tipp-URL zu einem „200, sieht aber kaputt aus" machen).
# Reihenfolge im Client: pathname === '/onboarding/verify' → Wizard ab 'verify'; === '/onboarding' → ab 'fields'.
location = /onboarding {
    try_files $uri /index.html;
}
location = /onboarding/verify {
    try_files $uri /index.html;
}

# DoldenBlick API (Backend: BFF + Compute) — lokaler Node-/Fastify-Dienst (127.0.0.1:8787,
# systemd: doldenblick-api). Same-origin: der Client ruft /api/*, nginx proxyt loopback-intern.
# Exakte Treffer (`=`), damit nichts mit /api/brightsky/ kollidiert; Query bleibt erhalten.
location = /api/health {
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location = /api/version {
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location = /api/water-balance {
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# DoldenBlick RS (Satelliten-Feld-Check) — lokaler Node-/Fastify-Dienst (127.0.0.1:8788,
# systemd: doldenblick-rs). /api/field-vigor macht zwei CDSE-Calls → höheres read-timeout.
location = /api/field-vigor {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}
location = /api/rs/health {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
}
location = /api/rs/version {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
}

# DoldenBlick Accounts (passwortlose Identität + Onboarding) — lokaler Fastify-Dienst (127.0.0.1:8789,
# systemd: doldenblick-accounts). Prefix-Locations; Cookies/Set-Cookie reicht nginx standardmäßig durch.
# App-seitiges Rate-Limit (@fastify/rate-limit) schützt /api/auth/* bereits; nginx proxyt nur.
location /api/auth/ {
    proxy_pass http://127.0.0.1:8789;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location /api/onboarding/ {
    proxy_pass http://127.0.0.1:8789;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 8m;   # GeoJSON-Schläge aus dem Onboarding (Client parst Shapefile, sendet GeoJSON)
}
# Ops-Endpunkte (Health/Version) — exakte Treffer, analog zu /api/rs/*. Für Monitoring/Deploy-Smoke.
location = /api/accounts/health {
    proxy_pass http://127.0.0.1:8789;
    proxy_set_header Host $host;
}
location = /api/accounts/version {
    proxy_pass http://127.0.0.1:8789;
    proxy_set_header Host $host;
}
